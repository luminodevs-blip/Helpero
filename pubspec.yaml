name: helpero
description: Consider it done.

publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  flutter_web_plugins:
    sdk: flutter

  # Core UI
  auto_size_text: 3.0.0
  carousel_slider: 5.0.0
  chewie: 1.11.3
  easy_debounce: 2.0.1
  equatable: 2.0.7
  flutter_animate: 4.5.0
  flutter_rating_bar: 4.0.1
  flutter_staggered_grid_view: 0.7.0
  font_awesome_flutter: 10.7.0
  from_css_color: 2.0.0
  lottie: 3.1.2
  page_transition: 2.1.0
  percent_indicator: 4.2.2
  pin_code_fields: 8.0.1
  pointer_interceptor: 0.10.1+2
  stop_watch_timer: 3.0.2
  styled_divider: 1.0.4

  # Maps
  flutter_map: 8.2.2
  latlong2: 0.9.1
  google_maps_flutter: 2.12.2
  mapbox_maps_flutter: 2.19.1
  flutter_radar: 3.12.4
  google_maps: 8.1.1

  # Navigation
  go_router: 12.1.3

  # Network & HTTP
  http: 1.4.0
  cached_network_image: 3.4.1

  # Storage & Cache
  flutter_cache_manager: 3.4.1
  flutter_secure_storage: 9.2.4
  hive: 2.2.3
  shared_preferences: 2.5.3
  sqflite: 2.3.3+1
  path_provider: 2.1.5

  # Auth
  google_sign_in: 6.3.0
  sign_in_with_apple: 7.0.1

  # Supabase
  supabase_flutter: 2.9.0
  supabase: 2.7.0
  gotrue: 2.12.0
  postgrest: 2.4.2
  realtime_client: 2.5.0
  storage_client: 2.4.0
  functions_client: 2.4.2

  # Payments
  flutter_stripe: 12.3.0

  # Device
  device_info_plus: 11.5.0
  geolocator: 14.0.1
  permission_handler: 12.0.0+1
  wakelock_plus: 1.3.2

  # Media & Files
  cross_file: 0.3.4+2
  video_player: 2.10.0
  webview_flutter: 4.13.0

  # Utils
  app_links: 6.3.2
  collection: 1.19.1
  csv: 6.0.0
  csslib: 1.0.2
  google_fonts: 6.3.3
  html: 0.15.6
  intl: 0.20.2
  json_path: 0.7.2
  mime_type: 1.0.0
  provider: 6.1.5
  rxdart: 0.27.7
  share_plus: 10.0.2
  synchronized: 3.4.0
  timeago: 3.7.1
  url_launcher: 6.3.1
  uuid: 4.5.1

  cupertino_icons: ^1.0.0

dependency_overrides:
  http: 1.4.0
  intl: 0.20.2
  rxdart: 0.27.7
  uuid: 4.5.1

dev_dependencies:
  flutter_launcher_icons: 0.13.1
  flutter_lints: 4.0.0
  image: 4.2.0
  lints: 4.0.0
  flutter_test:
    sdk: flutter


flutter_launcher_icons:
  android: 'launcher_icon'
  ios: true
  web:
    generate: true
  image_path: 'assets/images/app_launcher_icon.png'
  adaptive_icon_background: '#7b82f4'
  adaptive_icon_foreground: 'assets/images/adaptive_foreground_icon.png'


flutter:

  uses-material-design: true

  assets:
    - assets/fonts/
    - assets/images/
    - assets/videos/
    - assets/audios/
    - assets/rive_animations/
    - assets/pdfs/
    - assets/jsons/

  fonts:
    - family: FigmaIcons
      fonts:
        - asset: assets/fonts/FigmaIcons.ttf
    - family: MyFlutterApp
      fonts:
        - asset: assets/fonts/dadawdadawd.ttf
    - family: NonBinary
      fonts:
        - asset: assets/fonts/NonBinary.ttf
